<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Automações — CS · Branddi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --brand:       #00B4D8;
  --brand-dark:  #0096B4;
  --brand-light: #E0F7FC;
  --brand-mid:   #B2EAF5;
  --bg:    #ffffff;
  --bg2:   #f7fafb;
  --bg3:   #eef4f6;
  --text:  #0d1f26;
  --text2: #527080;
  --text3: #92adb8;
  --border:  rgba(0,180,216,0.13);
  --border2: rgba(0,180,216,0.28);
  --radius: 10px;
  --radius-lg: 14px;
  --shadow: 0 1px 4px rgba(0,100,130,0.08);
  --shadow-md: 0 4px 16px rgba(0,100,130,0.10);
  --font: 'Inter', system-ui, sans-serif;
}

body { font-family: var(--font); background: var(--bg3); color: var(--text); min-height: 100vh; }

/* ── Shell ── */
.shell { max-width: 1320px; margin: 0 auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 18px; }

/* ── Top bar ── */
.top-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.top-bar-left { display: flex; align-items: center; gap: 14px; }
.logo-mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #00B4D8, #007EA0); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: var(--shadow); }
.logo-mark svg { width: 20px; height: 20px; fill: white; }
.top-bar h1 { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
.top-bar-sub { font-size: 11px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; display: inline-block; box-shadow: 0 0 0 2px #dcfce7; }
.top-bar-right { display: flex; align-items: center; gap: 8px; }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 15px; border-radius: var(--radius); font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; letter-spacing: -.01em; }
.btn-primary { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: #fff; box-shadow: 0 2px 8px rgba(0,180,216,.35); }
.btn-primary:hover { box-shadow: 0 4px 14px rgba(0,180,216,.45); transform: translateY(-1px); }
.btn-secondary { background: var(--bg); border: 1px solid var(--border2); color: var(--text2); box-shadow: var(--shadow); }
.btn-secondary:hover { background: var(--brand-light); color: var(--brand-dark); border-color: var(--brand); }
.btn-danger { background: transparent; border: 1px solid rgba(163,45,45,.2); color: #a32d2d; font-size: 11px; padding: 4px 9px; }
.btn-danger:hover { background: #fcebeb; }
.btn-sm { font-size: 11px; padding: 5px 11px; }

/* ── Alerts ── */
.alert-wrap { display: flex; flex-direction: column; gap: 6px; }
.alert-banner { padding: 10px 14px; border-radius: var(--radius); font-size: 12px; display: flex; align-items: center; gap: 8px; font-weight: 500; }
.alert-banner.error { background: #fff1f1; border: 1px solid #fca5a5; color: #991b1b; }
.alert-banner.warn  { background: #fffbeb; border: 1px solid #fcd34d; color: #92400e; }

/* ── Metrics ── */
.metrics { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
@media (max-width: 700px) { .metrics { grid-template-columns: repeat(2, 1fr); } }
.metric { background: var(--bg); border-radius: var(--radius-lg); padding: 14px 16px; border: 1px solid var(--border); box-shadow: var(--shadow); position: relative; overflow: hidden; }
.metric::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--brand), var(--brand-dark)); border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 6px; font-weight: 600; }
.metric-value { font-size: 26px; font-weight: 700; color: var(--text); letter-spacing: -.03em; }
.metric-value.red { color: #dc2626; }
.metric-value.brand { color: var(--brand-dark); }
.metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── Toolbar ── */
.toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 10px 14px; box-shadow: var(--shadow); }
.view-toggle { display: flex; background: var(--bg3); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.vt-btn { background: none; border: none; padding: 6px 14px; font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .15s; }
.vt-btn.active { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: #fff; border-radius: var(--radius); box-shadow: 0 1px 4px rgba(0,180,216,.3); }
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
.search-wrap input { padding: 7px 10px 7px 30px; font-size: 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); width: 180px; transition: border-color .15s; }
.search-wrap input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(0,180,216,.12); }
.filter-select { font-size: 12px; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); color: var(--text); cursor: pointer; transition: border-color .15s; }
.filter-select:focus { outline: none; border-color: var(--brand); }
.status-filters { display: flex; gap: 5px; flex-wrap: wrap; }
.fb { background: none; border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .15s; }
.fb:hover { border-color: var(--brand); color: var(--brand-dark); background: var(--brand-light); }
.fb.active { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: #fff; border-color: transparent; box-shadow: 0 1px 4px rgba(0,180,216,.3); }

/* ── Content area ── */
.content-area { display: flex; gap: 12px; }
.list-view { flex: 1; min-width: 0; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow); }
.list-header { display: grid; grid-template-columns: 1fr 112px 120px 70px 80px 80px 80px; gap: 6px; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); }
.lh { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); }
.list-items { overflow-y: auto; max-height: 420px; }
.list-item { display: grid; grid-template-columns: 1fr 112px 120px 70px 80px 80px 80px; gap: 6px; padding: 10px 16px; border-bottom: 1px solid var(--border); cursor: pointer; align-items: center; transition: background .12s; }
.list-item:hover { background: var(--brand-light); }
.list-item.active { background: var(--brand-light); border-left: 3px solid var(--brand); }
.li-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub { font-size: 11px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.empty-row { padding: 32px; text-align: center; font-size: 13px; color: var(--text3); }

/* ── Avatar ── */
.avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: #fff; font-size: 9px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 1px 3px rgba(0,180,216,.3); }
.avatar-row { display: flex; align-items: center; gap: 5px; }
.avatar-name { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px; }

/* ── Badges ── */
.badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; display: inline-block; white-space: nowrap; letter-spacing: .01em; }
.b-concluido      { background: #dcfce7; color: #166534; }
.b-desenvolvimento{ background: var(--brand-light); color: #0369a1; }
.b-planejamento   { background: #fef9c3; color: #854d0e; }
.b-pausado        { background: #f1f5f9; color: #475569; }
.b-cancelado      { background: #fee2e2; color: #991b1b; }
.b-backlog        { background: #f3e8ff; color: #6b21a8; }
.pri-1 { background: #fee2e2; color: #991b1b; }
.pri-2 { background: #fef9c3; color: #854d0e; }
.pri-3 { background: #dcfce7; color: #166534; }
.dif-1 { background: #dcfce7; color: #166534; }
.dif-2 { background: #fef9c3; color: #854d0e; }
.dif-3 { background: #fee2e2; color: #991b1b; }

/* ── Progress bar ── */
.pbar-wrap { width: 56px; height: 5px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.pbar { height: 100%; border-radius: 4px; transition: width .3s; }
.pbar-concluido      { background: #22c55e; }
.pbar-desenvolvimento{ background: var(--brand); }
.pbar-planejamento   { background: #eab308; }
.pbar-pausado        { background: #94a3b8; }
.pbar-default        { background: var(--brand); }

/* ── Deadline ── */
.dl-ok   { font-size: 11px; color: #16a34a; font-weight: 600; }
.dl-warn { font-size: 11px; color: #d97706; font-weight: 600; }
.dl-over { font-size: 11px; color: #dc2626; font-weight: 600; }
.dl-none { font-size: 11px; color: var(--text3); }

/* ── Side panel ── */
.side-panel { width: 288px; flex-shrink: 0; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-md); }
.sp-head { padding: 12px 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg2); }
.sp-head h2 { font-size: 12px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: .05em; }
.sp-btns { display: flex; gap: 5px; }
.sp-tabs { display: flex; border-bottom: 1px solid var(--border); }
.sp-tab { flex: 1; padding: 8px; font-size: 11px; font-weight: 600; text-align: center; cursor: pointer; color: var(--text3); background: none; border: none; border-bottom: 2px solid transparent; transition: all .15s; }
.sp-tab.active { color: var(--brand-dark); border-bottom-color: var(--brand); }
.sp-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; max-height: 430px; }
.sp-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 180px; gap: 10px; color: var(--text3); text-align: center; padding: 20px; }
.sp-empty-icon { font-size: 28px; opacity: .4; }
.sp-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.4; letter-spacing: -.01em; }
.sp-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); margin-bottom: 7px; font-weight: 700; }
.sp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.sp-field { background: var(--bg2); border-radius: var(--radius); padding: 8px 10px; border: 1px solid var(--border); }
.sp-field.full { grid-column: 1 / -1; }
.sf-label { font-size: 9px; text-transform: uppercase; letter-spacing: .05em; color: var(--text3); margin-bottom: 3px; font-weight: 600; }
.sf-val { font-size: 12px; font-weight: 600; color: var(--text); }
.sf-val.warn { color: #d97706; }
.sf-val.over { color: #dc2626; }
.prog-full { display: flex; align-items: center; gap: 9px; }
.prog-full-bar { flex: 1; height: 6px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
.prog-full-inner { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--brand), var(--brand-dark)); transition: width .4s; }
.sp-desc { font-size: 12px; color: var(--text2); line-height: 1.6; background: var(--bg2); border-radius: var(--radius); padding: 10px; max-height: 90px; overflow-y: auto; border: 1px solid var(--border); }

/* ── History ── */
.hist-list { display: flex; flex-direction: column; }
.hist-item { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
.hist-item:last-child { border-bottom: none; }
.hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.hist-dot.create { background: var(--brand); }
.hist-dot.edit   { background: #eab308; }
.hist-dot.status { background: #22c55e; }
.hist-body { flex: 1; min-width: 0; }
.hist-action { font-size: 11px; color: var(--text); line-height: 1.5; font-weight: 500; }
.hist-meta { font-size: 10px; color: var(--text3); margin-top: 2px; }

/* ── Kanban ── */
.kanban-view { flex: 1; display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
.kb-col { min-width: 185px; flex: 1; display: flex; flex-direction: column; gap: 8px; max-height: 480px; }
.kb-col-head { padding: 9px 11px; border-radius: var(--radius); display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); flex-shrink: 0; box-shadow: var(--shadow); }
.kb-col-title { font-size: 11px; font-weight: 700; color: var(--text); letter-spacing: -.01em; }
.kb-count { font-size: 10px; font-weight: 600; color: var(--brand-dark); background: var(--brand-light); border-radius: 20px; padding: 2px 8px; }
.kb-cards { display: flex; flex-direction: column; gap: 7px; overflow-y: auto; flex: 1; padding-right: 1px; }
.kb-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px; cursor: pointer; transition: all .15s; box-shadow: var(--shadow); }
.kb-card:hover { border-color: var(--brand); box-shadow: 0 2px 10px rgba(0,180,216,.15); transform: translateY(-1px); }
.kb-card.active { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(0,180,216,.2); }
.kb-card.overdue  { border-left: 3px solid #dc2626; }
.kb-card.due-soon { border-left: 3px solid #d97706; }
.kb-card-name { font-size: 11px; font-weight: 600; color: var(--text); line-height: 1.4; margin-bottom: 7px; letter-spacing: -.01em; }
.kb-meta { display: flex; align-items: center; justify-content: space-between; gap: 4px; flex-wrap: wrap; }
.kb-area { font-size: 10px; color: var(--text3); font-weight: 500; }
.kb-badges { display: flex; gap: 3px; flex-wrap: wrap; }
.kb-avatar-row { display: flex; align-items: center; gap: 4px; margin-top: 5px; }
.kb-avatar { width: 18px; height: 18px; border-radius: 50%; background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: #fff; font-size: 8px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }
.kb-resp-name { font-size: 10px; color: var(--text3); }

/* ── Modal ── */
.overlay { position: fixed; inset: 0; background: rgba(0,20,40,.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; backdrop-filter: blur(2px); }
.modal { background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border); width: 100%; max-width: 520px; max-height: 92vh; overflow-y: auto; box-shadow: var(--shadow-md); }
.modal-head { padding: 15px 18px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--bg2); }
.modal-head h2 { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }
.btn-close { background: none; border: none; font-size: 20px; color: var(--text3); cursor: pointer; line-height: 1; transition: color .15s; }
.btn-close:hover { color: var(--text); }
.modal-body { padding: 18px; display: flex; flex-direction: column; gap: 13px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); font-weight: 700; }
.fg input, .fg select, .fg textarea { font-size: 13px; padding: 9px 12px; border-radius: var(--radius); border: 1px solid var(--border2); background: var(--bg); color: var(--text); width: 100%; transition: border-color .15s, box-shadow .15s; }
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(0,180,216,.12); }
.fg textarea { resize: vertical; min-height: 66px; }
.modal-foot { padding: 13px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; background: var(--bg2); }

/* ── Confirm ── */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,20,40,.45); display: flex; align-items: center; justify-content: center; z-index: 110; padding: 16px; backdrop-filter: blur(2px); }
.confirm-box { background: var(--bg); border-radius: var(--radius-lg); border: 1px solid var(--border); padding: 24px; max-width: 340px; width: 100%; box-shadow: var(--shadow-md); }
.confirm-box p { font-size: 13px; color: var(--text); margin-bottom: 18px; line-height: 1.6; }
.confirm-btns { display: flex; justify-content: flex-end; gap: 8px; }

/* ── Toast ── */
.toast { position: fixed; bottom: 24px; right: 24px; background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: #fff; padding: 11px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; transform: translateY(8px); box-shadow: 0 4px 16px rgba(0,180,216,.4); }
.toast.show { opacity: 1; transform: translateY(0); }

/* ── Loading ── */
.loading { display: flex; align-items: center; justify-content: center; padding: 48px; gap: 10px; font-size: 13px; color: var(--text2); }
.spinner { width: 20px; height: 20px; border: 2px solid var(--brand-mid); border-top-color: var(--brand); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="shell">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <div>
        <h1>Dashboard de Automações</h1>
        <div class="top-bar-sub">
          <span class="live-dot"></span>
          <span id="subtitle">Conectando...</span>
        </div>
      </div>
    </div>
    <div class="top-bar-right">
      <button class="btn btn-secondary" onclick="exportCSV()">↓ Exportar CSV</button>
      <button class="btn btn-primary" onclick="openModal()">+ Nova automação</button>
    </div>
  </div>

  <div class="alert-wrap" id="alert-banners"></div>
  <div class="metrics" id="metrics"></div>

  <div class="toolbar">
    <div class="view-toggle">
      <button class="vt-btn active" id="btn-lista"  onclick="setView('lista')">Lista</button>
      <button class="vt-btn"        id="btn-kanban" onclick="setView('kanban')">Kanban</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Buscar automação..." oninput="render()">
    </div>
    <select class="filter-select" id="filter-cat"  onchange="render()"><option value="">Todas as categorias</option></select>
    <select class="filter-select" id="filter-resp" onchange="render()"><option value="">Todos os responsáveis</option></select>
    <select class="filter-select" id="sort-by" onchange="render()">
      <option value="default">Padrão</option>
      <option value="pri-asc">Prioridade ↑</option>
      <option value="deadline-asc">Prazo ↑</option>
      <option value="prog-desc">Progresso ↓</option>
      <option value="prog-asc">Progresso ↑</option>
      <option value="name-asc">Nome A→Z</option>
    </select>
    <div class="status-filters" id="filters"></div>
  </div>

  <div class="content-area" id="content-area">
    <div class="loading"><div class="spinner"></div>Carregando dados...</div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Nova automação</h2>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="fg"><label>Nome da automação</label><input type="text" id="f-name" placeholder="Descreva a automação..."></div>
      <div class="form-row">
        <div class="fg"><label>Área</label><input type="text" id="f-area" placeholder="Ex: CS"></div>
        <div class="fg"><label>Categoria</label><input type="text" id="f-cat" placeholder="Ex: E-mail, Agenda..."></div>
      </div>
      <div class="form-row">
        <div class="fg"><label>Responsável</label><input type="text" id="f-resp" placeholder="Ex: Maria Eduarda, Keila..."></div>
        <div class="fg"><label>Status</label>
          <select id="f-status">
            <option value="Backlog">Backlog</option>
            <option value="Planejamento">Planejamento</option>
            <option value="Em desenvolvimento">Em desenvolvimento</option>
            <option value="Pausado">Pausado</option>
            <option value="Concluído">Concluído</option>
            <option value="Cancelado">Cancelado</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="fg"><label>Prioridade</label>
          <select id="f-pri">
            <option value="1">1 — Alta</option>
            <option value="2">2 — Média</option>

<script>
const SUPABASE_URL = 'https://oajgyzqejgmrrvzkktka.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9hamd5enFlamdtcnJ2emtrdGthIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTE2NTksImV4cCI6MjA5Mjg4NzY1OX0.A0x7EXsK3ryWxymrgENab-BlAYgfin6CIz63hYCuGhw';

const { createClient } = supabase;

const STATUS_MAP = {'Concluído':'b-concluido','Em desenvolvimento':'b-desenvolvimento','Planejamento':'b-planejamento','Pausado':'b-pausado','Cancelado':'b-cancelado','Backlog':'b-backlog'};
const PBAR_MAP   = {'Concluído':'pbar-concluido','Em desenvolvimento':'pbar-desenvolvimento','Planejamento':'pbar-planejamento','Pausado':'pbar-pausado'};
const PRI_MAP    = {'1':'pri-1','2':'pri-2','3':'pri-3'};
const DIF_MAP    = {'1':'dif-1','2':'dif-2','3':'dif-3'};
const PRI_LBL    = {'1':'Alta','2':'Média','3':'Baixa'};
const DIF_LBL    = {'1':'Fácil','2':'Média','3':'Difícil'};
const KB_COLS    = ['Backlog','Planejamento','Em desenvolvimento','Pausado','Concluído','Cancelado'];

let projects=[], editId=null, selectedId=null;
let activeFilter='Todos', currentView='lista', activeTab='detalhes', deleteTargetId=null;

const today=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
function daysDiff(s){if(!s)return null;const d=new Date(s);d.setHours(0,0,0,0);return Math.round((d-today())/86400000);}
function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;}
function fmtTs(ts){const d=new Date(ts);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}
function deadlineInfo(p){
  if(p.status==='Concluído'||p.status==='Cancelado')return{cls:'dl-none',text:'—'};
  if(!p.end_date)return{cls:'dl-none',text:'—'};
  const d=daysDiff(p.end_date);
  if(d<0)return{cls:'dl-over',text:`${Math.abs(d)}d atrasado`};
  if(d===0)return{cls:'dl-warn',text:'Vence hoje'};
  if(d<=7)return{cls:'dl-warn',text:`${d}d restantes`};
  return{cls:'dl-ok',text:fmtDate(p.end_date)};
}
function initials(name){if(!name)return'?';const p=name.trim().split(/[\s,]+/);return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}
function getUnique(f){return[...new Set(projects.map(p=>p[f]).filter(Boolean))].sort();}
function pbarClass(status){return PBAR_MAP[status]||'pbar-default';}

async function loadProjects(){
  const{data,error}=await db.from('automacoes').select('*').order('id');
  if(error){document.getElementById('content-area').innerHTML=`<div class="loading" style="color:#dc2626">Erro ao conectar ao banco de dados.</div>`;return;}
  projects=data||[];
  renderAll();
  db.channel('automacoes').on('postgres_changes',{event:'*',schema:'public',table:'automacoes'},async()=>{
    const{data:fresh}=await db.from('automacoes').select('*').order('id');
    projects=fresh||[];
    renderAll();
  }).subscribe();
}

async function saveProject(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Informe o nome da automação.');return;}
  const author=document.getElementById('f-author').value.trim()||'Desconhecido';
  const now=new Date().toISOString();
  const payload={
    name,
    area:document.getElementById('f-area').value.trim()||'CS',
    category:document.getElementById('f-cat').value.trim()||'Geral',
    responsible:document.getElementById('f-resp').value.trim(),
    status:document.getElementById('f-status').value,
    priority:parseInt(document.getElementById('f-pri').value)||3,
    difficulty:parseInt(document.getElementById('f-dif').value)||3,
    progress:Math.min(100,Math.max(0,parseInt(document.getElementById('f-prog').value)||0)),
    tool:document.getElementById('f-tool').value.trim(),
    kpi:document.getElementById('f-kpi').value.trim(),
    notes:document.getElementById('f-obs').value.trim(),
    start_date:document.getElementById('f-start').value||null,
    end_date:document.getElementById('f-end').value||null,
  };
  if(editId){
    const old=projects.find(x=>x.id===editId);
    const changes=diffProject(old,payload);
    const newHist=[...(old.history||[])];
    if(changes.length){const isStatus=changes.some(c=>c.startsWith('Status:'));newHist.push({type:isStatus?'status':'edit',author,note:changes.join(' | '),ts:now});}
    payload.history=newHist;
    const{error}=await db.from('automacoes').update(payload).eq('id',editId);
    if(error){alert('Erro ao salvar: '+error.message);return;}
    showToast('Automação atualizada!');
  } else {
    payload.history=[{type:'create',author,note:'Automação criada',ts:now}];
    const{data,error}=await db.from('automacoes').insert(payload).select().single();
    if(error){alert('Erro ao criar: '+error.message);return;}
    selectedId=data.id;
    showToast('Automação adicionada!');
  }
  closeModal();
}

async function deleteProject(id){
  const{error}=await db.from('automacoes').delete().eq('id',id);
  if(error){alert('Erro ao excluir: '+error.message);return;}
  if(selectedId===id)selectedId=null;
  closeConfirm();showToast('Automação excluída.');
}

function diffProject(old,novo){
  const labels={name:'Nome',area:'Área',category:'Categoria',responsible:'Responsável',status:'Status',priority:'Prioridade',difficulty:'Dificuldade',progress:'Progresso',tool:'Ferramenta',kpi:'KPI',notes:'Observação',start_date:'Início',end_date:'Prazo'};
  return Object.keys(labels).reduce((acc,k)=>{
    let ov=String(old[k]??''),nv=String(novo[k]??'');
    if(ov!==nv){
      if(k==='priority'){ov=PRI_LBL[ov]||ov;nv=PRI_LBL[nv]||nv;}
      if(k==='difficulty'){ov=DIF_LBL[ov]||ov;nv=DIF_LBL[nv]||nv;}
      if(k==='progress'){ov+='%';nv+='%';}
      if(k==='start_date'||k==='end_date'){ov=fmtDate(ov||null);nv=fmtDate(nv||null);}
      acc.push(`${labels[k]}: "${ov||'—'}" → "${nv||'—'}"`);
    }
    return acc;
  },[]);
}

function getFiltered(){
  const q=(document.getElementById('search')||{value:''}).value.toLowerCase();
  const sortBy=(document.getElementById('sort-by')||{value:'default'}).value;
  const catF=(document.getElementById('filter-cat')||{value:''}).value;
  const respF=(document.getElementById('filter-resp')||{value:''}).value;
  let list=[...projects];
  if(activeFilter!=='Todos')list=list.filter(p=>p.status===activeFilter);
  if(catF)list=list.filter(p=>p.category===catF);
  if(respF)list=list.filter(p=>p.responsible===respF);
  if(q)list=list.filter(p=>p.name.toLowerCase().includes(q)||(p.responsible||'').toLowerCase().includes(q)||(p.notes||'').toLowerCase().includes(q));
  const sorters={'pri-asc':(a,b)=>(a.priority||9)-(b.priority||9),'deadline-asc':(a,b)=>{const da=a.end_date?daysDiff(a.end_date):9999,db=b.end_date?daysDiff(b.end_date):9999;return da-db;},'prog-desc':(a,b)=>b.progress-a.progress,'prog-asc':(a,b)=>a.progress-b.progress,'name-asc':(a,b)=>a.name.localeCompare(b.name)};
  if(sorters[sortBy])list.sort(sorters[sortBy]);
  return list;
}

function populateSelects(){
  const fc=document.getElementById('filter-cat'),cv=fc?.value;

  if(fc){fc.innerHTML='<option value="">Todas as categorias</option>'+getUnique('category').map(c=>`<option value="${c}">${c}</option>`).join('');fc.value=cv;}
  if(fr){fr.innerHTML='<option value="">Todos os responsáveis</option>'+getUnique('responsible').map(r=>`<option value="${r}">${r}</option>`).join('');fr.value=rv;}
}

function renderMetrics(){
  const t=projects.length,done=projects.filter(p=>p.status==='Concluído').length;
  const dev=projects.filter(p=>p.status==='Em desenvolvimento').length;
  const hi=projects.filter(p=>p.priority==1).length;
  const overdue=projects.filter(p=>p.end_date&&p.status!=='Concluído'&&p.status!=='Cancelado'&&daysDiff(p.end_date)<0).length;
  const pct=t?Math.round(done/t*100):0;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value brand">${t}</div><div class="metric-sub">automações</div></div>
    <div class="metric"><div class="metric-label">Em desenvolvimento</div><div class="metric-value">${dev}</div><div class="metric-sub">em andamento</div></div>
    <div class="metric"><div class="metric-label">Concluídas</div><div class="metric-value">${done}</div><div class="metric-sub">${pct}% do total</div></div>
    <div class="metric"><div class="metric-label">Alta prioridade</div><div class="metric-value">${hi}</div><div class="metric-sub">prioridade 1</div></div>
    <div class="metric"><div class="metric-label">Atrasadas</div><div class="metric-value ${overdue>0?'red':''}">${overdue}</div><div class="metric-sub">prazo vencido</div></div>
  `;
  document.getElementById('subtitle').textContent=`${t} projeto${t!==1?'s':''} · CS · tempo real`;
}

function renderAlerts(){
  const overdue=projects.filter(p=>p.end_date&&p.status!=='Concluído'&&p.status!=='Cancelado'&&daysDiff(p.end_date)<0);
  const soon=projects.filter(p=>p.end_date&&p.status!=='Concluído'&&p.status!=='Cancelado'&&daysDiff(p.end_date)>=0&&daysDiff(p.end_date)<=7);
  let html='';
  if(overdue.length)html+=`<div class="alert-banner error">⚠ ${overdue.length} automação${overdue.length>1?'ões':''} com prazo vencido: ${overdue.map(p=>p.name).join(', ')}</div>`;
  if(soon.length)html+=`<div class="alert-banner warn">◷ ${soon.length} automação${soon.length>1?'ões':''} vencem em até 7 dias: ${soon.map(p=>p.name).join(', ')}</div>`;
  document.getElementById('alert-banners').innerHTML=html;
}

      <div class="sp-section"><h3>Informações</h3>
        <div class="sp-grid">
          <div class="sp-field"><div class="sf-label">Área</div><div class="sf-val">${p.area||'—'}</div></div>
          <div class="sp-field"><div class="sf-label">Categoria</div><div class="sf-val">${p.category||'—'}</div></div>
          ${p.responsible?`<div class="sp-field full"><div class="sf-label">Responsável</div><div class="sf-val" style="display:flex;align-items:center;gap:7px"><div class="avatar">${initials(p.responsible)}</div>${p.responsible}</div></div>`:''}
          <div class="sp-field"><div class="sf-label">Início</div><div class="sf-val">${fmtDate(p.start_date)}</div></div>
          <div class="sp-field"><div class="sf-label">Prazo</div><div class="sf-val ${dl.cls==='dl-over'?'over':dl.cls==='dl-warn'?'warn':''}">${p.end_date?fmtDate(p.end_date)+(dl.text!==fmtDate(p.end_date)?' ('+dl.text+')':''):'—'}</div></div>
          ${p.tool?`<div class="sp-field full"><div class="sf-label">Ferramenta</div><div class="sf-val">${p.tool}</div></div>`:''}
        </div>
      </div>
      ${p.kpi?`<div class="sp-section"><h3>KPI monitorado</h3><div class="sp-desc">${p.kpi}</div></div>`:''}

  const hist=p.history||[];
  const histHtml=`
    <div class="sp-body">
      ${hist.length===0?`<div class="sp-empty"><div class="sp-empty-icon">📋</div><span style="font-size:12px">Nenhum registro ainda</span></div>`:''}
      <div class="hist-list">
        ${[...hist].reverse().map(h=>`
          <div class="hist-item">

function openModal(id){
  editId=id||null;

  if(id){
    const p=projects.find(x=>x.id===id);
    document.getElementById('f-name').value=p.name;
    document.getElementById('f-area').value=p.area||'';
    document.getElementById('f-cat').value=p.category||'';
    document.getElementById('f-resp').value=p.responsible||'';
    document.getElementById('f-status').value=p.status;
    document.getElementById('f-pri').value=p.priority||3;
    document.getElementById('f-dif').value=p.difficulty||3;
    document.getElementById('f-prog').value=p.progress||0;
    document.getElementById('f-tool').value=p.tool||'';
    document.getElementById('f-kpi').value=p.kpi||'';
    document.getElementById('f-obs').value=p.notes||'';
    document.getElementById('f-start').value=p.start_date||'';
    document.getElementById('f-end').value=p.end_date||'';
  } else {
    ['f-name','f-area','f-cat','f-resp','f-tool','f-kpi','f-obs'].forEach(x=>document.getElementById(x).value='');
    document.getElementById('f-status').value='Backlog';
    document.getElementById('f-pri').value='3';
    document.getElementById('f-dif').value='3';
    document.getElementById('f-prog').value='0';
    document.getElementById('f-start').value='';
    document.getElementById('f-end').value='';
  }
  document.getElementById('f-author').value='';
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}

function confirmDelete(id){
  deleteTargetId=id;
  const p=projects.find(x=>x.id===id);
  document.getElementById('confirm-msg').textContent=`Deseja excluir "${p.name}"? Esta ação não pode ser desfeita.`;
  document.getElementById('confirm-overlay').style.display='flex';
  document.getElementById('confirm-ok').onclick=()=>deleteProject(deleteTargetId);
}
function closeConfirm(){document.getElementById('confirm-overlay').style.display='none';}

function exportCSV(){
  const list=getFiltered();
  const headers=['ID','Nome','Área','Categoria','Responsável','Status','Prioridade','Dificuldade','Progresso (%)','Ferramenta','KPI','Início','Prazo','Observação'];
  const rows=list.map(p=>[p.id,p.name,p.area,p.category,p.responsible||'',p.status,PRI_LBL[p.priority]||'',DIF_LBL[p.difficulty]||'',p.progress,p.tool,p.kpi,fmtDate(p.start_date),fmtDate(p.end_date),p.notes].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','));
  const csv='\uFEFF'+[headers.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='automacoes_cs.csv';a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exportado!');
}

loadProjects();
</script>
